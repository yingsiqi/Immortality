apiVersion: v1
kind: ConfigMap
metadata:
  name: immortality-config
  namespace: immortality
data:
  postgres-host: "postgres-svc"
  redis-host: "redis-svc"
  eventstore-url: "esdb://eventstore-svc:2113?tls=false"

---
apiVersion: v1
kind: Secret
metadata:
  name: immortality-secrets
  namespace: immortality
type: Opaque
stringData:
  postgres-password: "CHANGE_ME"
  jwt-secret: "CHANGE_ME_IN_PRODUCTION_AT_LEAST_32_CHARACTERS_LONG"

---
# AuthService Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: immortality
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: immortality/auth-service:latest
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: immortality-config
            - secretRef:
                name: immortality-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: immortality
spec:
  selector:
    app: auth-service
  ports:
    - port: 5001
      targetPort: 5001

---
# GameService Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-service
  namespace: immortality
spec:
  replicas: 3
  selector:
    matchLabels:
      app: game-service
  template:
    metadata:
      labels:
        app: game-service
    spec:
      containers:
        - name: game-service
          image: immortality/game-service:latest
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: immortality-config
            - secretRef:
                name: immortality-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: game-service
  namespace: immortality
spec:
  selector:
    app: game-service
  ports:
    - port: 5002
      targetPort: 5002

---
# Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: immortality
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: immortality/gateway:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: immortality-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: immortality
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 3001

---
# RealtimeService Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-service
  namespace: immortality
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-service
  template:
    metadata:
      labels:
        app: realtime-service
    spec:
      containers:
        - name: realtime-service
          image: immortality/realtime-service:latest
          ports:
            - containerPort: 5003

---
apiVersion: v1
kind: Service
metadata:
  name: realtime-service
  namespace: immortality
spec:
  selector:
    app: realtime-service
  ports:
    - port: 5003
      targetPort: 5003
